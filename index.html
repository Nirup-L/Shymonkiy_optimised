<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Chat App</title>

    <link rel="stylesheet" href="/styles.css" />

    <link rel="stylesheet" href="styles/login.css" />
    <link rel="stylesheet" href="styles/chat.css" />
    <link rel="stylesheet" href="styles/preview.css" />
  </head>

  <body>
    <!-- MAIN APP ROOT -->
    <div id="app">
      <!-- LOGIN PAGE -->
      <div id="loginPage" class="page">
        <div class="login-container">
          <h2>Login</h2>

          <input type="text" id="userIdInput" placeholder="User ID" />

          <input type="password" id="passwordInput" placeholder="Password" />

          <button id="loginBtn">Login</button>

          <p id="loginError"></p>
        </div>
      </div>

      <!-- CHAT LIST PAGE -->
      <div id="chatListPage" class="page hidden">
        <div class="chatlist-header">
          <h2>Chats</h2>

          <button id="logoutBtn">Logout</button>
        </div>

        <div id="chatListContainer"></div>
      </div>

      <!-- CHAT PAGE -->
      <div id="chatPage" class="page hidden">
        <div class="chat-header">
          <button id="backBtn">←</button>

          <div class="chat-user-info">
            <h3 id="chatUserName"></h3>

            <span id="lastSeen"></span>
          </div>
        </div>

        <!-- MESSAGES AREA -->
        <div id="messageContainer"></div>

        <!-- MESSAGE INPUT AREA -->
        <div class="message-input-area">
          <input type="file" id="fileInput" hidden />

          <button id="attachBtn">📎</button>

          <input type="text" id="messageInput" placeholder="Type a message" />

          <button id="sendBtn">Send</button>
        </div>
      </div>

      <!-- MEDIA PREVIEW PAGE -->
      <div id="mediaPreviewPage" class="page hidden">
        <div class="preview-header">
          <button id="cancelPreviewBtn">Cancel</button>

          <button id="sendMediaBtn">Send</button>
        </div>

        <div id="previewContainer"></div>
      </div>
    </div>

    <!-- MAIN SCRIPT -->
    <script type="module" src="main.js"></script>
  </body>
</html>
